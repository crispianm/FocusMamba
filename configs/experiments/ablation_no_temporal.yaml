# Ablation: No Temporal Modelling
# =================================
# Frame-by-frame baseline — disables temporal Mamba blocks.
# Demonstrates the importance of temporal state propagation.

training:
  max_epochs: 300
  batch_size: 4

model:
  type: conv_baseline         # per-frame processing, no temporal blocks
  embed_dim: 96
  encoder_depths: [2, 2, 4, 2]

distillation:
  enabled: true
  teachers:
    - name: depth_pro
      weight: 0.5
      loss: si_log
    - name: video_depth_anything
      weight: 0.5
      loss: si_log

loss:
  si_log_weight: 1.0
  gradient_weight: 0.5
  temporal_weight: 0.0        # no temporal loss for framewise model
