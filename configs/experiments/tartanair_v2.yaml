# TartanAir v2 — supervised training with ground-truth depth.
#
# No degradations. No teachers (optional — add below to enable distillation).
# GT depth supervision via SI-log loss.
#
# Usage:
#   python train.py --config configs/experiments/tartanair_v2.yaml
#
# Quick sanity check (CPU, 2 trajectories, 1 epoch):
#   python train.py --config configs/experiments/tartanair_v2.yaml \
#       --device cpu

# ── Model ─────────────────────────────────────────────────────────────────
model:
  type: mamba
  embed_dim: 96
  encoder_depths: [2, 2, 4, 2]
  d_state: 16
  d_conv: 4
  expand: 2

# ── Data ──────────────────────────────────────────────────────────────────
data:
  dataset: tartanair_v2
  root: /projects/b5dh/data/tartanair-v2
  num_frames: 8
  image_size: [256, 256]
  max_trajectories: null     # null = use all; set a small int (e.g. 10) for quick tests
  clip_stride: 8             # clips start every 8th frame within a trajectory
  frame_stride: 1            # consecutive frames
  val_fraction: 0.1          # 10 % of trajectories held out for validation
  seed: 42
  difficulty: Data_easy      # Data_easy or Data_hard
  camera: lcam_front
  max_depth: 80.0             # depths > max_depth are masked (set to 0); must match cacher clipping
  envs: null                 # null = all environments; or list e.g. [AbandonedFactory, ocean]

  # Pre-cached teacher pseudo-labels generated by tools/cache_teacher_labels.py.
  # Set this to eliminate ~2.5 s/it of teacher inference overhead during training.
  # Leave null to fall back to live teacher inference (or GT-only if no teachers).
  teacher_cache_dir: /projects/b5dh/data/teacher_cache/tartanair_v2

# ── Teachers ──────────────────────────────────────────────────────────────
# Leave empty for GT-only supervised training.
# Uncomment / add entries to enable distillation on top of GT supervision.
teachers:
  - name: video_depth_anything
    enabled: true
    checkpoint_path: checkpoints/metric_video_depth_anything_vitl.pth
    device: cuda
    temporal_window: 8
    weight: 1.0
  - name: depth_anything_v3
    enabled: true
    checkpoint_path: checkpoints/da3_metric.safetensors  # needs config.json in same dir
    model_name: da3metric-large
    device: cuda
    # Weight reduced: this checkpoint is indoor-biased (max ~14 m output),
    # treating it as a structural/geometry guide rather than a metric teacher.
    # VDA and DepthPro provide reliable metric scale.
    weight: 0.3
  - name: depth_pro
    enabled: true
    checkpoint_path: checkpoints/depth_pro.pt
    device: cuda
    weight: 1.0
  

# ── Training ──────────────────────────────────────────────────────────────
training:
  max_epochs: 300
  batch_size: 8              # per GPU; effective batch = batch_size × gradient_accumulation_steps
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip: 1.0
  precision: bf16            # bf16 on CUDA; falls back to fp32 on CPU
  val_every_n_epochs: 2
  ema_decay: 0.999
  num_workers: 8             # GH200 has fast NVLink; more workers = less data stall

  # Gradient accumulation: accumulate over N micro-batches before stepping.
  # Effective batch size = batch_size × gradient_accumulation_steps = 4 × 4 = 16.
  gradient_accumulation_steps: 4

  # torch.compile: fuses CUDA kernels, ~20-40 % throughput gain on GH200.
  # Set false only if you hit a compilation error.
  compile: true

  # When teacher_cache_dir is set, skip loading the heavy teacher models at
  # startup.  Cached pseudo-labels are loaded from disk by the DataLoader.
  # Set false to force live teacher inference (e.g. to rebuild the cache).
  skip_live_teachers: true

  log_dir: runs/tartanair_v2
  checkpoint_dir: checkpoints/tartanair_v2

  # TensorBoard image logging
  log_images_every_n_steps: 200  # reduced from 50 to avoid I/O overhead
  log_images_max_batch: 2        # how many samples per grid
  step_log_every_n_steps: 25     # used by train.py debug logger; debug mode forces 1

# ── Loss ──────────────────────────────────────────────────────────────────
loss:
  si_log_weight: 1.0
  l1_weight: 1.0
  distillation_weight: 1.0
  gradient_weight: 1.0
  temporal_weight: 1.0
  uncertainty_nll_weight: 0.2
