# Trial run — YouTube-VOS distillation from all three teachers, L1 loss only.
#
# Teachers run on clean 518×518 frames to produce pseudo-GT depth.
# Student trains on clean 256×256 frames (no degradation yet).
# All teacher inference is frozen; L1 loss only (no si_log, no gradient loss).
#
# Usage:
#   python test_training.py --config configs/experiments/trial_youtube_vos.yaml

# ── Model ─────────────────────────────────────────────────────────────────
model:
  type: mamba
  embed_dim: 96
  encoder_depths: [2, 2, 4, 2]
  d_state: 16
  d_conv: 4
  expand: 2

# ── Data ──────────────────────────────────────────────────────────────────
data:
  root: data/youtube-vos/train_all_frames/JPEGImages
  num_frames: 8
  image_size: [256, 256]
  max_videos: 100            # subset for sanity check; set null for full dataset
  clip_stride: 8             # clips start every 8th frame within a video
  frame_stride: 1            # consecutive frames
  val_fraction: 0.1          # 10 videos held out for validation
  seed: 42
  patch_size: 4
  t_patch: 2

# ── Teachers ──────────────────────────────────────────────────────────────
# Paths relative to the project root.
# Drop the weight files into ./checkpoints/ then run.
teachers:
  - name: video_depth_anything
    enabled: true
    checkpoint_path: checkpoints/metric_video_depth_anything_vitl.pth
    device: cuda
    temporal_window: 8
    weight: 1.0
  - name: depth_anything_v3
    enabled: true
    checkpoint_path: checkpoints/da3_metric.safetensors  # needs config.json in same dir
    model_name: da3metric-large
    device: cuda
    weight: 1.0
  - name: depth_pro
    enabled: true
    checkpoint_path: checkpoints/depth_pro.pt
    device: cuda
    weight: 1.0

# ── Training ──────────────────────────────────────────────────────────────
training:
  max_epochs: 50
  batch_size: 2              # per GPU; with 8 frames × 256×256 this fits on GH200
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 200
  grad_clip: 1.0
  precision: bf16
  val_every_n_epochs: 5
  ema_decay: 0.999
  num_workers: 4

  log_dir: runs/trial_youtube_vos
  checkpoint_dir: checkpoints/trial_youtube_vos

  # TensorBoard image logging
  log_images_every_n_steps: 50   # log image grids every N steps
  log_images_max_batch: 2        # how many samples from the batch to visualise

# Loss: L1 only for this trial run
# All other weights are zero — kept for structural compatibility with CombinedLoss.
loss:
  l1_weight: 1.0
  si_log_weight: 0.0
  distillation_weight: 0.0
  gradient_weight: 0.0
  temporal_weight: 0.0
  uncertainty_nll_weight: 0.0
