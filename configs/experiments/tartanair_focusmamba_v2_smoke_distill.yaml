# TartanAir v2 smoke run: FocusMamba v2 + cached teacher-output distillation.
# Purpose: validate Mamba CUDA kernels + end-to-end training wiring quickly.

model:
  type: mamba
  variant: small
  num_blocks: 12
  out_indices: [2, 5, 8, 11]
  d_state: 16
  d_conv: 4
  expand: 2
  num_frames: 8
  positional_encoding: ape
  strict_checkpoint: false
  require_mamba: true

data:
  dataset: tartanair_v2
  root: /projects/b5dh/data/tartanair-v2
  num_frames: 8
  image_size: [336, 336]
  max_trajectories: 12
  clip_stride: 8
  frame_stride: 1
  val_fraction: 0.1
  seed: 42
  difficulty: Data_easy
  camera: lcam_front
  max_depth: 80.0
  envs: null
  teacher_cache_dir: /projects/b5dh/data/teacher_cache/tartanair_v2

teachers:
  - name: video_depth_anything
    enabled: true
    checkpoint_path: checkpoints/metric_video_depth_anything_vitl.pth
    device: cuda
    temporal_window: 8
    weight: 1.0
  - name: depth_anything_v3
    enabled: true
    checkpoint_path: checkpoints/da3_metric.safetensors
    model_name: da3metric-large
    device: cuda
    weight: 1.0
  - name: depth_pro
    enabled: true
    checkpoint_path: checkpoints/depth_pro.pt
    device: cuda
    weight: 1.0

distillation:
  enabled: true
  teachers:
    - name: video_depth_anything
      weight: 1.0
      loss: si_log_plus_temporal
    - name: depth_anything_v3
      weight: 1.0
      loss: si_log
    - name: depth_pro
      weight: 1.0
      loss: si_log
  confidence_weighted: true

degradation:
  enabled: false
  curriculum: false

training:
  max_epochs: 2
  batch_size: 2
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 50
  grad_clip: 1.0
  precision: bf16
  val_every_n_epochs: 1
  ema_decay: 0.999
  num_workers: 8
  gradient_accumulation_steps: 1
  compile: false
  ddp_find_unused_parameters: true
  skip_live_teachers: true
  cpu_prefetch: true
  cpu_prefetch_batches: 2
  log_dir: runs/focusmamba_v2_smoke_distill
  checkpoint_dir: checkpoints/focusmamba_v2_smoke_distill
  log_images_every_n_steps: 100
  log_images_max_batch: 2
  step_log_every_n_steps: 10
  verbose_log_file: runs/focusmamba_v2_smoke_distill/train_verbose.log

loss:
  ssi_weight: 1.0
  temporal_weight: 10.0
  temporal_threshold: 0.05
  temporal_log_space: false
  ssi_mode: l2
  distillation_weight: 0.5
