# FocusMamba Configuration
# ========================

# Data pipeline
batch_size: 8
window_length: 8          # T = number of frames per clip
clip_stride: 4            # stride for sliding window sampling
patch_size: 4             # tubelet spatial patch size
t_patch: 2                # tubelet temporal patch size
resolution: [256, 256]    # training crop size [H, W]

# Circle of Confusion parameters
focal_length_range: [24.0, 85.0]    # mm, sampled uniformly
aperture_range: [2.8, 10.0]         # f-number, sampled log-uniform
max_coc: 0.05                       # normalisation scalar (calibrate with inspect_coc_distribution.py)
beta_alpha: 2.0                     # Beta distribution alpha for focus plane sampling
beta_beta: 2.0                      # Beta distribution beta for focus plane sampling

# Model architecture
embed_dim: 96             # base embedding dimension
encoder_depths: [2, 2, 4, 2]  # number of Spatial+Temporal block pairs per stage
d_state: 16               # Mamba SSM state dimension
d_conv: 4                 # Mamba local convolution width
expand: 2                 # Mamba inner dimension expansion factor

# Training
learning_rate: 1.0e-6
# warmup_steps must be << max_epochs * batches_per_epoch.
# With default data (6 train clips, batch_size=4, drop_last=True) there is
# ~1 batch per epoch, so 50 epochs = ~50 total steps.  Keep warmup short.
warmup_steps: 10
max_epochs: 1000
grad_clip: 0.5
precision: bf16

# Loss weights
lambda_l1: 1.0
lambda_ssim: 0 #0.5
lambda_grad: 0 #0.5
lambda_tgm: 0 #0.2

# Validation
val_every_n_epochs: 2

# Data splits (scene-level, deterministic)
train_ratio: 0.8
val_ratio: 0.1
test_ratio: 0.1
split_seed: 42

# Paths
data_root: /mnt/DATA/youtube-vos
# data_root: ./data
log_dir: ./runs
checkpoint_dir: ./checkpoints

# Model type: 'mamba' or 'transformer'
model_type: mamba

# Degradation (low-light simulation)
degradation:
  enabled: false
  lux_level: 10.0             # simulated illuminance (50=normal, 5=very low)
  poisson_scale: 0.02         # base shot-noise gain at lux=50
  gaussian_std: 0.01          # base read-noise std at lux=50
  blur_kernel_size: 15        # motion-blur PSF kernel size (odd)
  blur_intensity: 1.0         # camera-shake trajectory length multiplier
  temporal_variance: 0.05     # per-frame noise parameter jitter (fraction)
  apply_brightness_drop: true # reduce brightness to simulate low-light scene
